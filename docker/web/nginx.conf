server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Frame images can be large; allow generous upstream timeouts.
    client_max_body_size 100M;

    # Docker's embedded DNS. A bare hostname in proxy_pass is resolved once at
    # config load and the IP cached for the worker's lifetime — so when vd-api
    # is recreated (every deploy, or any restart::unless-stopped recovery) it
    # gets a new IP and this container 502s until nginx is reloaded. Resolving
    # through a variable forces per-request re-resolution against this resolver.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # API + static file routes are proxied to the api container. The web app
    # calls these as same-origin relative paths (see vite.config.ts proxy).
    location /api/ {
        set $api_upstream vd-api;
        proxy_pass http://$api_upstream:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        set $files_upstream vd-api;
        proxy_pass http://$files_upstream:8000$request_uri;
        proxy_set_header Host $host;
    }

    # SPA fallback — client-side routing (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
