# Production compose for the `layla` server. Installed as
# ~/docker/compose/video-detections.yml and pulled in by ~/docker/docker-compose.yml.
#
# Unlike docker/docker-compose.yml (local dev), this file runs NO postgres or
# redis of its own — it reuses the shared `infra.yml` services on the `prod`
# network. Postgres there must be the pgvector image.
#
# Images are built by ./tools/scripts/deploy.sh on the dev machine and pushed
# to the private registry (nas.malfin.com:10100). The deploy script rewrites
# the VD_*_IMAGE vars in ~/docker/.env to the new tags before `compose up`.

x-vd-env: &vd-env
  # `:?` — fail the `compose up` loudly if the var is unset, rather than
  # silently baking an empty password into the container (which only surfaces
  # later as a crash-looping auth failure). Set it in ~/docker/.env.
  VD_DATABASE_URL: postgresql+asyncpg://video_detection_user:${VIDEO_DETECTION_DB_PASSWORD:?set VIDEO_DETECTION_DB_PASSWORD in ~/docker/.env}@postgres:5432/video_detection
  VD_REDIS_URL: redis://redis:6379/5
  VD_INBOX_DIR: /data/videos/inbox
  VD_PROCESSED_DIR: /data/videos/processed
  VD_FAILED_DIR: /data/videos/failed
  VD_FRAMES_DIR: /data/frames
  VD_MODELS_DIR: /data/models
  VD_FRAME_FPS: "1.0"
  VD_DETECTION_MIN_CONFIDENCE: "0.25"
  VD_SUBCLASS_MIN_CONFIDENCE: "0.55"
  VD_FRAME_JPEG_QUALITY: "90"
  VD_SUBCLASS_RETRAIN_THRESHOLD: "25"
  VD_YOLO_BASE_MODEL: yolo11l.pt
  VD_INSIGHTFACE_PACK: buffalo_l
  VD_DELETE_PROCESSED_VIDEOS: "false"
  VD_DELETE_FRAMES_WITHOUT_OBJECTS: "true"

services:
  vd-api:
    image: ${VD_API_IMAGE:?set VD_API_IMAGE in ~/docker/.env}
    container_name: vd-api
    restart: unless-stopped
    environment: *vd-env
    volumes:
      - /mnt/nas/app-data/video-detections/data/frames:/data/frames
      # The API writes browser uploads (POST /api/clips/upload) into inbox/;
      # the ingest-watcher shares this mount and picks them up on close/move.
      - /mnt/nas/app-data/video-detections/data/videos:/data/videos
    ports:
      - "10801:8000"
    networks:
      - prod
    depends_on:
      - vd-worker-cpu

  vd-web:
    image: ${VD_WEB_IMAGE:?set VD_WEB_IMAGE in ~/docker/.env}
    container_name: vd-web
    restart: unless-stopped
    ports:
      - "10800:80"
    networks:
      - prod
    depends_on:
      - vd-api

  # Shares VD_WORKER_IMAGE with vd-worker-gpu — the deploy script builds the
  # worker image with --target gpu because the lean `cpu` target omits vd-ml,
  # but worker/tasks/__init__.py imports every task module (incl. GPU ones)
  # eagerly, so the worker can't even start without the full ML stack. This
  # container still only consumes the `cpu` queue and gets no GPU device, so
  # queue isolation is intact — only the lean-image optimization is dropped.
  vd-worker-cpu:
    image: ${VD_WORKER_IMAGE:?set VD_WORKER_IMAGE in ~/docker/.env}
    container_name: vd-worker-cpu
    restart: unless-stopped
    environment: *vd-env
    volumes:
      - /mnt/nas/app-data/video-detections/data/videos:/data/videos
      - /mnt/nas/app-data/video-detections/data/frames:/data/frames
      - /mnt/nas/app-data/video-detections/data/models:/data/models
    command: celery -A worker.app worker -Q cpu -c 2 --loglevel=INFO
    networks:
      - prod

  vd-worker-gpu:
    image: ${VD_WORKER_IMAGE:?set VD_WORKER_IMAGE in ~/docker/.env}
    container_name: vd-worker-gpu
    restart: unless-stopped
    environment: *vd-env
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - /mnt/nas/app-data/video-detections/data/videos:/data/videos
      - /mnt/nas/app-data/video-detections/data/frames:/data/frames
      - /mnt/nas/app-data/video-detections/data/models:/data/models
    command: celery -A worker.app worker -Q gpu,train -c 1 --loglevel=INFO
    networks:
      - prod

  vd-ingest-watcher:
    image: ${VD_WATCHER_IMAGE:?set VD_WATCHER_IMAGE in ~/docker/.env}
    container_name: vd-ingest-watcher
    restart: unless-stopped
    environment: *vd-env
    volumes:
      - /mnt/nas/app-data/video-detections/data/videos:/data/videos
    networks:
      - prod

  vd-flower:
    image: mher/flower:2.0
    container_name: vd-flower
    restart: unless-stopped
    command: celery --broker=redis://redis:6379/5 flower --port=5555
    ports:
      - "10802:5555"
    networks:
      - prod

networks:
  prod:
    external: true
