server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Frame images can be large; allow generous upstream timeouts.
    client_max_body_size 100M;

    # API + static file routes are proxied to the api container. The web app
    # calls these as same-origin relative paths (see vite.config.ts proxy).
    location /api/ {
        proxy_pass http://vd-api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /files/ {
        proxy_pass http://vd-api:8000;
        proxy_set_header Host $host;
    }

    # SPA fallback — client-side routing (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
