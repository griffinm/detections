# Minimal infra-only compose for local dev. Brings up just postgres + redis;
# api, workers, watcher, and web are expected to run on the host (uvicorn /
# celery / vite) for fast iteration and direct GPU access.
#
# Usage:
#   docker compose -f docker/dev-compose.yml up -d
#
# The full-stack dev compose (workers + watcher + flower in containers) is
# docker/docker-compose.yml; use that when you need the GPU worker in a
# container.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: vd
      POSTGRES_PASSWORD: vd
      POSTGRES_DB: video_detection
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vd"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata: {}
